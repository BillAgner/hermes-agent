[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "research-project-mcp"
version = "0.1.0"
description = "MCP server for structured research-project state — hypothesis tracking, evidence accumulation, contradictions, and dead ends across sessions. Mirrors to open-notebook for source browsing."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bill Agner", email = "noreply@hermes.local" },
]
keywords = ["mcp", "research", "epistemic-state", "hypothesis-tracking", "knowledge-base"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Text Processing",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "httpx>=0.27",
    "mcp[cli]>=1.0",
    "pydantic>=2.0",
]

[project.scripts]
research-project-mcp = "research_project_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/research_project_mcp"]