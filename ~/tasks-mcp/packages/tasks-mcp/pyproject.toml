[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tasks-mcp"
version = "0.1.0"
description = "MCP server for Hermes personal task & follow-up tracking. SQLite-backed, dashboard-friendly, cross-references research projects."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bill Agner", email = "noreply@hermes.local" },
]
keywords = ["mcp", "tasks", "todo", "follow-ups", "personal-assistant"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
] 
dependencies = [
    "mcp[cli]>=1.0",
    "pydantic>=2.0",
]

[project.scripts]
tasks-mcp = "tasks_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/tasks_mcp"]
