[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "google-workspace-mcp"
version = "0.1.0"
description = "MCP server for Gmail + Calendar (and friends) via Google's official APIs. Reads the existing google-workspace-skill token at C:\\Data\\Hermes\\google_token.json (or env override), refreshes access tokens automatically, and exposes per-service tools for the agent loop."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bill Agner", email = "noreply@hermes.local" },
]
keywords = ["mcp", "gmail", "calendar", "google", "oauth", "personal-assistant"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "google-api-python-client>=2.100",
    "google-auth>=2.27",
    "google-auth-oauthlib>=1.2",
    "mcp[cli]>=1.0",
    "pydantic>=2.0",
]

[project.scripts]
google-workspace-mcp = "google_workspace_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/google_workspace_mcp"]
