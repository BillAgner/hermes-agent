[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-notebook-mcp"
version = "0.1.0"
description = "MCP server for open-notebook — curate research in the open-notebook UI and read findings back from any Hermes session."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bill Agner", email = "noreply@hermes.local" },
]
keywords = ["mcp", "open-notebook", "research", "knowledge-base", "curation", "notes"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Text Processing",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "httpx>=0.27",
    "mcp[cli]>=1.0",
]

[project.scripts]
open-notebook-mcp = "open_notebook_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/open_notebook_mcp"]
