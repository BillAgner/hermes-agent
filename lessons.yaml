- id: L-20260618-202506
  trigger: 'Building a new MCP server with FastMCP, or seeing `TypeError: issubclass()
    arg 1 must be a class` at the first @mcp.tool() decorator at import time'
  action: '1. Do NOT use `from __future__ import annotations` in any file that defines
    @mcp.tool() functions. FastMCP inspects parameter annotations via `inspect.signature`,
    and with future-annotations ALL annotations become strings. Then `issubclass("str",
    Context)` raises `TypeError: issubclass() arg 1 must be a class` at import time,
    before the MCP server ever serves a request. 2. Do NOT use `Optional[X]` annotations
    on @mcp.tool() params either — `Optional[X]` becomes `Union[X, None]` and FastMCP''s
    introspection also chokes. Use bare `X = None` (param.annotation stays as the
    class)."'
  rationale: FastMCP 1.x's `Tool.from_function()` calls `issubclass(param.annotation,
    Context)` on every parameter. PEP 563 / future-annotations turn annotations into
    strings, breaking that. `typing.Optional[X]` becomes `typing.Union[X, None]`,
    also not a class. Both crash at module import time when the tool decorator runs."
  scope: Any file using mcp.server.fastmcp.FastMCP @mcp.tool() decorators (liteparse-mcp,
    markitdown-mcp, and any future MCP server)
  counterexample_conditions: Plain functions (not MCP tools) with `from __future__
    import annotations` and `Optional[X]` work fine in modern Python — this rule applies
    only to @mcp.tool() decorated functions and any other callables FastMCP inspects.
  observed_count: 1
  importance: 0.8
  tags:
  - mcp
  - fastmcp
  - annotations
  - build-gotcha
  - liteparse
  last_validated: '2026-06-18T20:25:06.257624+00:00'
  source_episodes: []
  status: active
  profile_id: default
- id: L-20260618-212054
  trigger: Creating a Windows directory junction from MSYS bash (git-bash / MINGW64)
    using `cmd //c "mklink /J ..."` or `cmd /c "mklink ..."` with the target path
    quoted as part of a single string, or seeing `dir` report "File Not Found" inside
    a junction that cmd itself just created.
  action: 'Invoke cmd with mklink args as an array (PowerShell: `& cmd.exe /c mklink
    /J arg1 arg2` with positional args), OR run `mklink` from a native Windows shell
    (cmd.exe directly, or PowerShell). Do NOT pass a single quoted-string command
    line like `cmd /c "mklink /J \"path1\" \"path2\""` from MSYS bash — MSYS path-mangling
    prepends an extra `C:\` to the target and you get a junction whose target is `C:\C:\...`
    (resolves to nothing). Verify after creation with `fsutil reparsepoint query <link>`
    or `cmd /c dir /AL <parent>` — the target column should be a single `C:\...` path.'
  rationale: MSYS bash translates POSIX-style paths when invoking Windows tools. When
    a single argument contains backslashes that are also shell-quote delimiters, MSYS's
    argv construction mangles the boundary and cmd receives a target that already
    has `C:\` glued onto the front. PowerShell's `& cmd.exe /c mklink /J arg1 arg2`
    passes them as separate argv items that MSYS doesn't munge, and PowerShell's own
    path handling is correct. Native cmd.exe (without MSYS) doesn't have the problem.
  scope: Windows, MSYS bash, git-bash, MINGW64, mklink /J, mklink /D, directory junctions,
    symlinks, PowerShell + cmd interop
  counterexample_conditions: Running `mklink /J` from cmd.exe directly (no MSYS layer)
    — single-quoted string works fine. Creating files with `touch` or `echo` from
    MSYS bash — those don't go through cmd and don't have the path-mangling issue.
    Symlinks (mklink /D) in `C:\Users\<user>\` from MSYS bash — that's a different
    failure mode (privilege), not this quoting bug.
  observed_count: 1
  importance: 0.75
  tags:
  - windows
  - msys
  - mklink
  - junction
  - path-quoting
  last_validated: '2026-06-18T21:20:54.350661+00:00'
  source_episodes: []
  status: active
  profile_id: default
- id: L-20260618-212109
  trigger: 'Installing a Claude-Code-style plugin (Understand-Anything, or any plugin
    whose SKILL.md hardcodes `$HOME/.understand-anything-plugin` or similar `~/.<plugin>-plugin`
    lookup) into a Hermes host where HERMES_HOME is non-canonical (e.g. `C:\Data\Hermes`
    instead of `%USERPROFILE%\.hermes`). Symptom: `/understand` (or equivalent) fails
    at Phase 0.5 with "Cannot find the plugin root" after listing the candidates it
    checked.'
  action: 'In addition to the skills junction (folder-style), create a SECOND directory
    junction at `$HOME/.<plugin>-plugin` → `<repo>/<plugin-dir>`. For Understand-Anything
    on Bill''s host: `cmd /c mklink /J "C:\Users\bobup\.understand-anything-plugin"
    "C:\Data\Hermes\~\Understand-Anything\understand-anything-plugin"`. The UA skill''s
    Phase 0.5 plugin-root resolver checks `$HOME/.understand-anything-plugin` as one
    of several candidates; this junction makes that path resolve even when Hermes
    is installed at a non-canonical location. Idempotent install script at `C:\Data\Hermes\scripts\install_understand_anything_link.ps1`.
    Mklink /J junctions inside the user''s own profile don''t require admin.'
  rationale: 'Upstream plugins like Understand-Anything hardcode common install paths
    (e.g. `$HOME/.understand-anything-plugin`) as plugin-root lookup candidates. When
    the host''s actual HERMES_HOME diverges from the user''s `$HOME` (Bill''s setup:
    HERMES_HOME=C:\Data\Hermes but HOME=/c/Users/bobup), the skills-junction alone
    is not enough — the runtime plugin-root lookup still fails. The fix is a second
    junction at the canonical user-home path so the upstream lookup finds the plugin.
    This pattern will recur for any third-party Claude Code plugin installed into
    a non-canonical Hermes.'
  scope: Hermes non-canonical installs, Claude Code plugin ports (Understand-Anything,
    future similar), Windows + MSYS bash, $HOME != HERMES_HOME
  counterexample_conditions: Standard Hermes install at `%USERPROFILE%\.hermes\` (HERMES_HOME
    matches $HOME) — the upstream `install.sh hermes` works as-is, no extra junction
    needed. Pure Claude Code / Cursor / Copilot users — those platforms set their
    own plugin-root env var (CLAUDE_PLUGIN_ROOT) and don't need the home junction.
  observed_count: 1
  importance: 0.7
  tags:
  - understand-anything
  - hermes
  - non-canonical-install
  - plugin-root
  - junction
  last_validated: '2026-06-18T21:21:09.120626+00:00'
