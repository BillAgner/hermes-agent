- id: L-20260621-223233
  trigger: editing or reviewing a route handler in hermes-agent/hermes_cli/web_server.py
    that uses HERMES_HOME
  action: 'Check whether HERMES_HOME is defined as a local var inside the function
    (correct) or a sibling function (bug — NameError at runtime). If a handler references
    the bare name `HERMES_HOME`, search the function for `HERMES_HOME = ` — if missing,
    add a local definition: `HERMES_HOME = Path(os.environ.get("HERMES_HOME", "C:/Data/Hermes"))`.
    If not `HERMES_HOME.exists()`-check, fall back to `Path("C:/Data/Hermes")`. Watch
    out for the shadow-by-local pattern: a local defined in health_deep() (line ~1400)
    was the silent cause of /api/watchdog/state returning HTTP 500 until 2026-06-21.'
  rationale: 'Sibling-function locals are not visible across function boundaries in
    Python. web_server.py grew several endpoint handlers that reuse module-level variable
    names (HERMES_HOME) but those names were only defined locally in some handlers,
    not at module scope. Result: NameError → HTTP 500 with no useful body. The dashboard''s
    "watchdog 500s" silent failure mode was the only visible symptom.'
  scope: hermes-agent/hermes_cli/web_server.py
  counterexample_conditions: 'If the function already has `import os` and `HERMES_HOME
    = Path(os.environ.get("HERMES_HOME", "C:/Data/Hermes"))` at the top of the function
    body, do NOT add another — duplicate definition is fine but a redundant one. Also:
    if you''re adding a brand-new handler, define HERMES_HOME locally inside it from
    the start; don''t assume module-level.'
  observed_count: 1
  importance: 0.5
  tags: []
  last_validated: '2026-06-21T22:32:33.419697+00:00'
