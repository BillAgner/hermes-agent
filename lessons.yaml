- id: L-20260618-224208
  trigger: 'Python script via `python << EOF` heredoc in MSYS bash fails with `bash:
    line N: {var}: command not found` (where var was meant to be a Python f-string
    substitution), or seeing your LLM prompt arrive empty/mangled after passing through
    a heredoc.'
  action: 'When running Python scripts via the terminal tool with a heredoc that interpolates
    user-supplied content into a JSON template, use explicit string concatenation
    or `.format()` rather than f-strings. MSYS bash''s heredoc passes content through
    PowerShell-like escape handling that treats single `{` and `}` as placeholder
    syntax and emits `bash: line N: {src}: command not found`. Safe pattern: `user_prompt
    = ''...'' + variable + ''...''`. Avoid f-string braces inside heredoc bodies;
    if f-strings are required, escape braces with double-braces (`{{` / `}}`), which
    is brittle when the JSON template has many braces.'
  rationale: 'MSYS bash''s heredoc handling differs from native bash: it passes the
    heredoc body through the bash parser for variable expansion AND command substitution,
    treating `{...}` patterns as command-substitution attempts. f-strings embed `{var}`
    patterns that bash then tries to execute. The escape is to use string concatenation
    or explicit `%s` formatting that bash sees as opaque text.'
  scope: Hermes terminal tool, MSYS bash, heredocs to python, f-string interpolation,
    JSON template generation
  counterexample_conditions: Running the same Python script via `python file.py` where
    the script is saved on disk — heredoc quoting isn't involved. f-strings work fine
    there. Running with `python -c "..."` on a single line — no heredoc. Use `bash
    -c 'python << EOF ... EOF'` directly (not through terminal tool's MSYS layer)
    — MSYS interpolation doesn't fire.
  observed_count: 1
  importance: 0.65
  tags:
  - msys
  - heredoc
  - python
  - f-string
  - json-template
  last_validated: '2026-06-18T22:42:08.130828+00:00'
  source_episodes: []
  status: active
  profile_id: default
- id: L-20260620-194354
  trigger: User asks to act on an item whose state was last set in a prior tool call
    this session, or references work from a previous turn without context
  action: 'Verify state before re-acting: check whether the prior tool call''s result
    already accomplished what the user is asking for. Surface what''s already done
    (''item 6 already removed in tool call at HH:MM:SS'') and confirm before re-doing.
    If state is uncertain (file exists but content unknown), use `read_file`/`cat`/`ls`
    first rather than re-executing.'
  rationale: Bill's "forget 6, unless it is done already" was a direct correction
    for acting on stale assumptions. Re-doing completed work burns time, pollutes
    state, and erodes trust in agent self-awareness. The agent has the prior tool
    result in context — a quick verify is cheap.
  scope: workflow:state-verification
  counterexample_conditions: Don't redundantly verify when context clearly says the
    action is needed (e.g. user explicitly says "do X" with no prior session reference).
    Verification is for when the prior turn's actions overlap with the current request.
  observed_count: 1
  importance: 0.5
  tags:
  - workflow, verification, user-preference
  last_validated: '2026-06-20T19:43:54.714701+00:00'
