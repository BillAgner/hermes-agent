- id: L-20260618-192834
  trigger: Writing or reviewing Hermes config-access code — any file under `hermes-agent/agent/`
    or `hermes-agent/tools/` that calls `cfg_get(...)` or imports from `hermes_cli.config`.
    Also triggers when a config-driven feature silently returns a default value at
    runtime (the symptom of the bug).
  action: Use `from agent._config_helpers import cfg_get_dotted` and call `cfg_get_dotted("auxiliary.foo.bar",
    default)`. Do NOT use `from hermes_cli.config import cfg_get` followed by `cfg_get("auxiliary.foo.bar",
    default)` — that's the broken form.
  rationale: '`hermes_cli.config.cfg_get` is variadic on a dict: `cfg_get(cfg_dict,
    key1, key2, ..., default=...)`. When you pass a dotted string as the first arg,
    the function treats the dotted string AS the config dict — it''s not a dict, so
    the function returns `default` and silently masks the bug. The dedicated `_config_helpers.cfg_get_dotted`
    helper loads the config and traverses the dotted path properly. This pattern caused
    8 broken call sites that were all fixed on 2026-06-16. Tests must patch `agent._config_helpers.cfg_get_dotted`
    (NOT `hermes_cli.config.cfg_get`).'
  scope: hermes-agent config code, dotted-path config access patterns, agent/* and
    tools/* directories
  counterexample_conditions: 'For direct dict access on an already-loaded config dict
    (no dotted path, single-level key), the variadic form is correct: `cfg_get(loaded_dict,
    "key", default=...)`. The dedicated helper is only required when the input is
    a dotted-string path. Don''t reflexively replace every `cfg_get` call — check
    the first arg''s shape.'
  observed_count: 1
  importance: 0.85
  tags:
  - config
  - hermes-agent
  - cfg_get
  - cfg_get_dotted
  - silent-fail
  - migration-fix-2026-06-16
  last_validated: '2026-06-18T19:28:34.807408+00:00'
  source_episodes:
  - 2026-06-16 migration fix (8 call sites)
  status: active
  profile_id: default
- id: L-20260618-201454
  trigger: 'Using liteparse''s `search_items()` standalone function with TextItem
    list, or noticing "TypeError: ''TextItem'' object is not an instance of ''PyTextItem''"'
  action: Use `LiteParse.search(file, phrase)` method (the patched one) instead of
    the standalone `search_items()` function. The standalone function in the upstream
    liteparse wrapper has a type bug — it converts native PyTextItem → wrapper TextItem
    via `_convert_native_result`, then calls the native `_native_search_items` which
    expects PyTextItem back. The patched method parses natively and uses native items
    throughout."
  rationale: The Python wrapper at `liteparse/parser.py` line 270 calls `_native_search_items(wrapper_items,
    ...)` which fails because `wrapper_items` is `List[TextItem]` (the @dataclass)
    but native expects `List[PyTextItem]` (the Rust struct). The fix in this fork
    adds `LiteParse.search()` that parses natively, collects native items from `native_result.pages[].text_items`,
    calls native search, then wraps results.
  scope: liteparse Python wrapper at C:\Data\Hermes\~\liteparse\packages\python\liteparse\parser.py
  counterexample_conditions: Calling `search_items(items, phrase)` where `items` is
    a fresh list of native PyTextItem (e.g. before going through `_convert_native_result`)
    — that path works fine.
  observed_count: 1
  importance: 0.7
  tags:
  - liteparse
  - pdf-parsing
  - wrapper-bug
  last_validated: '2026-06-18T20:14:54.276708+00:00'
  source_episodes: []
  status: active
  profile_id: default
