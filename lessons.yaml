- id: L-20260621-162913
  trigger: When picking a local ollama model for a workload — especially a high-volume,
    trivial, or batch task (e.g., contextualizer, fact extraction, summarization of
    short content, formatting helpers, retry/regenerate loops).
  action: Default to non-thinking dense models for high-volume trivial local workloads.
    Use thinking models only where reasoning materially adds value. Don't reach for
    a "thinking" variant just because it's newer or larger. Match the tool to the
    task.
  rationale: On 2026-06-21 Bill corrected me after I swapped the contextualizer default
    from qwen2.5:14b (14B dense) → Qwen3-VL-8B-Thinking. The contextualizer generates
    ~50-100 token prefixes for every memory-fact write at high volume; thinking tax
    (500-2000 reasoning tokens per call) is wrong fit even though tokens aren't the
    bottleneck. Bill also noted local models aren't token-limited in a way that matters
    — tool fit is the real concern. The 32B-Thinking → 8B-Thinking swap for *fallback
    analysis* (youtube-content, fallback-llm-video-analysis) still made sense because
    structured analysis benefits from reasoning; the contextualizer does not.
  scope: hermes / local-model-selection
  counterexample_conditions: Use thinking models when the task is structured analysis
    with reasoning steps (e.g., claims-veracity table, chapter extraction from long
    transcripts, financial/political synthesis where proper-noun reasoning matters).
    The youtube-content / fallback-llm-video-analysis skills stay on Qwen3-VL-8B-Thinking
    for that reason. Don't apply this lesson to those.
  observed_count: 1
  importance: 0.5
  tags:
  - local-models, ollama, thinking-mode, model-selection, contextualizer
  last_validated: '2026-06-21T16:29:13.386322+00:00'
  source_episodes:
  - 2026-06-21 model-swap session
